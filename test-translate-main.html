<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻译服务测试 - Electron 主进程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .test-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .test-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .test-btn:active {
            transform: translateY(0);
        }
        .test-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            min-height: 50px;
        }
        .result.success {
            border-left: 4px solid #4caf50;
            background: #f1f8f4;
        }
        .result.error {
            border-left: 4px solid #f44336;
            background: #fef1f0;
        }
        .result h3 {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .result.success h3 { color: #4caf50; }
        .result.error h3 { color: #f44336; }
        .result p {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
        }
        .result .error-msg {
            color: #f44336;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
        }
        .info-box p {
            color: #1976d2;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 翻译服务测试</h1>
        <p class="subtitle">通过 Electron 主进程调用百度翻译 API（无 CORS 限制）</p>

        <div class="info-box">
            <p>ℹ️ <strong>说明：</strong>此测试通过 Electron 主进程发起翻译请求，完全绕过浏览器 CORS 限制。需要在 Electron 环境中运行。</p>
        </div>

        <div class="test-section">
            <h2>📝 百度翻译（主进程）</h2>
            <button class="test-btn" onclick="testBaiduMainProcess()">测试百度翻译</button>
            <div class="result" id="baidu-main-result"></div>
        </div>
    </div>

    <script>
        async function testBaiduMainProcess() {
            const resultDiv = document.getElementById('baidu-main-result');
            const btn = event.target;
            
            btn.disabled = true;
            resultDiv.className = 'result';
            resultDiv.innerHTML = '<span class="loading"></span> 正在请求...';

            try {
                // Check if we're in Electron environment
                if (!window.utils || !window.utils.electron) {
                    throw new Error('不在 Electron 环境中，window.utils.electron 不可用');
                }

                const testText = 'Hello, this is a test of the translation service.';
                const toLang = 'zh-CN';

                console.log('[Test] Calling window.utils.electron.invoke...');
                
                const result = await window.utils.electron.invoke('translate-via-main', testText, toLang);

                if (result.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✓ 翻译成功</h3>
                        <p><strong>原文：</strong>${testText}</p>
                        <p><strong>译文：</strong>${result.result}</p>
                    `;
                    console.log('[Test] Success:', result.result);
                } else {
                    throw new Error(result.error || '翻译失败');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>✗ 请求失败</h3>
                    <p class="error-msg"><strong>错误：</strong>${error.message}</p>
                `;
                console.error('[Test] Error:', error);
            } finally {
                btn.disabled = false;
            }
        }

        // Auto-test on load if in Electron
        window.addEventListener('load', () => {
            if (window.utils && window.utils.electron) {
                console.log('[Test] Electron environment detected, starting auto-test...');
                setTimeout(() => testBaiduMainProcess(), 500);
            } else {
                console.log('[Test] Not in Electron environment, please open in Electron app.');
                document.getElementById('baidu-main-result').className = 'result error';
                document.getElementById('baidu-main-result').innerHTML = `
                    <h3>⚠️ 非 Electron 环境</h3>
                    <p class="error-msg">此测试需要在 Electron 环境中运行。请通过 Fluent Reader 应用打开此页面。</p>
                `;
            }
        });
    </script>
</body>
</html>
