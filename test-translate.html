<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>翻译服务测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: #666; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; max-height: 300px; }
    </style>
</head>
<body>
    <h1>翻译服务测试</h1>
    
    <div class="test-section">
        <h2>1. 百度公开接口（无需 Key）</h2>
        <button onclick="testBaiduPublic()">测试百度翻译</button>
        <div id="baidu-result"></div>
    </div>

    <div class="test-section">
        <h2>2. MyMemory API</h2>
        <button onclick="testMyMemory()">测试 MyMemory</button>
        <div id="mymemory-result"></div>
    </div>

    <div class="test-section">
        <h2>3. 有道公开接口</h2>
        <button onclick="testYoudaoPublic()">测试有道翻译</button>
        <div id="youdao-result"></div>
    </div>

    <script>
        async function testBaiduPublic() {
            const resultDiv = document.getElementById('baidu-result');
            resultDiv.innerHTML = '<p class="info">测试中 (使用 CORS 代理)...</p>';
            
            const text = 'Hello world';
            const targetLang = 'zh';
            const targetUrl = `https://fanyi.baidu.com/transapi?from=auto&to=${targetLang}&query=${encodeURIComponent(text)}`;
            // Use CORS proxy
            const url = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            
            try {
                console.log('[Baidu Test] Requesting via proxy:', url);
                
                const response = await fetch(url, {
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                console.log('[Baidu Test] Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('[Baidu Test] Response data:', JSON.stringify(data, null, 2));
                
                if (data.data && data.data.length > 0) {
                    const firstItem = data.data[0];
                    let translated = '';
                    
                    if (firstItem.dst) {
                        translated = data.data.map(item => item.dst).join('\n');
                    } else if (firstItem.result && firstItem.result[1]) {
                        translated = firstItem.result[1].map(item => item[1]).join('');
                    }
                    
                    if (translated) {
                        resultDiv.innerHTML = `
                            <p class="success">✓ 成功！</p>
                            <p><strong>原文：</strong>${text}</p>
                            <p><strong>译文：</strong>${translated}</p>
                            <details>
                                <summary>完整响应</summary>
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </details>
                        `;
                    } else {
                        resultDiv.innerHTML = `
                            <p class="error">✗ 返回数据格式异常</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        `;
                    }
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">✗ 返回空结果</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('[Baidu Test] Error:', error);
                resultDiv.innerHTML = `
                    <p class="error">✗ 请求失败</p>
                    <p><strong>错误：</strong>${error.message}</p>
                `;
            }
        }

        async function testMyMemory() {
            const resultDiv = document.getElementById('mymemory-result');
            resultDiv.innerHTML = '<p class="info">测试中...</p>';
            
            const text = 'Hello world';
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-CN`;
            
            try {
                console.log('[MyMemory Test] Requesting:', url);
                
                const response = await fetch(url);
                console.log('[MyMemory Test] Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('[MyMemory Test] Response data:', JSON.stringify(data, null, 2));
                
                if (data.responseStatus === 200 && data.responseData?.translatedText) {
                    resultDiv.innerHTML = `
                        <p class="success">✓ 成功！</p>
                        <p><strong>原文：</strong>${text}</p>
                        <p><strong>译文：</strong>${data.responseData.translatedText}</p>
                        <details>
                            <summary>完整响应</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">✗ 返回空结果</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('[MyMemory Test] Error:', error);
                resultDiv.innerHTML = `
                    <p class="error">✗ 请求失败</p>
                    <p><strong>错误：</strong>${error.message}</p>
                `;
            }
        }

        async function testYoudaoPublic() {
            const resultDiv = document.getElementById('youdao-result');
            resultDiv.innerHTML = '<p class="info">测试中...</p>';
            
            const text = 'Hello world';
            const url = `https://fanyi.youdao.com/translate?&doctype=json&type=auto2zh-CHS&i=${encodeURIComponent(text)}`;
            
            try {
                console.log('[Youdao Test] Requesting:', url);
                
                const response = await fetch(url);
                console.log('[Youdao Test] Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('[Youdao Test] Response data:', JSON.stringify(data, null, 2));
                
                if (data.translateResult && data.translateResult.length > 0) {
                    const translated = data.translateResult.map(item => 
                        item.map(part => part.tgt).join('')
                    ).join('');
                    
                    resultDiv.innerHTML = `
                        <p class="success">✓ 成功！</p>
                        <p><strong>原文：</strong>${text}</p>
                        <p><strong>译文：</strong>${translated}</p>
                        <details>
                            <summary>完整响应</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">✗ 返回空结果</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('[Youdao Test] Error:', error);
                resultDiv.innerHTML = `
                    <p class="error">✗ 请求失败</p>
                    <p><strong>错误：</strong>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
